name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: ./gradlew packageReleaseMsi
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: composeApp/build/compose/binaries/main-release/msi/*.msi

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x gradlew && ./gradlew packageReleaseDmg
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x gradlew && ./gradlew packageReleaseDeb
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: composeApp/build/compose/binaries/main-release/deb/*.deb
